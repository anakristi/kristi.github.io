<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" href="img/flowers.png" type="image/x-icon">
  <title>flowers</title>

  <style>
    .ucapan {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 28px;
      color: white;
      font-weight: bold;
      z-index: 999;
      font-family: sans-serif;
      text-shadow: 0 0 10px rgba(255,255,255,0.8);
      animation: fadeIn 3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Style untuk video box yang bisa digeser */
    .video-container {
      position: fixed; 
      bottom: 80px; 
      right: 20px; 
      width: 200px; 
      z-index: 1000; 
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      overflow: hidden;
      cursor: move; /* Mengubah kursor mouse jadi tanda panah geser */
      touch-action: none; /* Mencegah layar HP ikut ter-scroll saat video digeser */
      user-select: none;
    }
    
    .video-container video {
      width: 100%;
      display: block;
      pointer-events: auto; /* Tombol play/pause bawaan video tetap berfungsi */
    }
  </style>
</head>

<body class="container">

  <div class="ucapan">
    Barakallah fii umrik Vania
  </div>

  <div class="night"></div>

  <div class="flowers">

    <div class="flower flower--1">
      <div class="flower__leafs flower__leafs--1">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>

    <div class="flower flower--2">
      <div class="flower__leafs flower__leafs--2">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>

    <div class="flower flower--3">
      <div class="flower__leafs flower__leafs--3">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>

    <div class="growing-grass"></div>
    <div class="grow-ans"></div>
    <div class="long-g"></div>

  </div>

  <div class="video-container" id="draggableVideo">
    <video id="myVideo" autoplay muted loop playsinline controls>
      <source src="videoplayback.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <script src="main.js"></script>

  <script>
    const video = document.getElementById('myVideo');
    const container = document.getElementById('draggableVideo');

    // 1. Force Autoplay Script
    window.addEventListener('load', () => {
      video.play().catch(error => {
        console.log("Autoplay diblokir browser, menunggu klik user.");
      });
    });

    document.addEventListener('click', () => {
      if (video.paused) { video.play(); }
    }, { once: true });


    // 2. Drag & Drop Script (Support Mouse & Layar Sentuh HP)
    let isDragging = false;
    let startX, startY;
    let initialLeft, initialTop;

    function startDrag(e) {
      // Abaikan jika user menekan tombol controls video
      if (e.target.tagName === 'VIDEO' && e.offsetY > e.target.clientHeight - 40) return;
      
      isDragging = true;
      
      // Ambil posisi awal pointer (mouse/touch)
      startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
      startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
      
      // Ambil posisi koordinat box saat ini
      const rect = container.getBoundingClientRect();
      initialLeft = rect.left;
      initialTop = rect.top;
      
      // Ubah posisi CSS dari bottom/right ke top/left agar sinkron saat digeser
      container.style.bottom = 'auto';
      container.style.right = 'auto';
      container.style.left = initialLeft + 'px';
      container.style.top = initialTop + 'px';
    }

    function doDrag(e) {
      if (!isDragging) return;
      e.preventDefault();

      // Hitung pergeseran pointer
      const currentX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
      const currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
      
      const dx = currentX - startX;
      const dy = currentY - startY;

      // Update posisi box video sesuai arah geser
      container.style.left = (initialLeft + dx) + 'px';
      container.style.top = (initialTop + dy) + 'px';
    }

    function stopDrag() {
      isDragging = false;
    }

    // Listener untuk Mouse (Laptop/PC)
    container.addEventListener('mousedown', startDrag);
    document.addEventListener('mousemove', doDrag);
    document.addEventListener('mouseup', stopDrag);

    // Listener untuk Touch (HP/Tablet)
    container.addEventListener('touchstart', startDrag);
    document.addEventListener('touchmove', doDrag, { passive: false });
    document.addEventListener('touchend', stopDrag);
  </script>
</body>
</html>
