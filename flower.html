<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" href="img/flowers.png" type="image/x-icon">
  <title>flowers</title>

  <!-- tambahan style untuk ucapan -->
  <style>
    .ucapan {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 28px;
      color: white;
      font-weight: bold;
      z-index: 999;
      font-family: sans-serif;
      text-shadow: 0 0 10px rgba(255,255,255,0.8);
      animation: fadeIn 3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Style tambahan untuk video agar muncul di depan dan estetik */
    .video-container {
      position: fixed; 
      bottom: 20px; 
      right: 20px; 
      width: 200px; 
      z-index: 1000; 
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    
    .video-container video {
      width: 100%;
      display: block;
    }
  </style>
</head>

<body class="container">

  <!-- 🌙 ucapan -->
  <div class="ucapan">
    Barakallah fii umrik Vania
  </div>

  <div class="night"></div>

  <div class="flowers">

    <div class="flower flower--1">
      <div class="flower__leafs flower__leafs--1">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>

    <div class="flower flower--2">
      <div class="flower__leafs flower__leafs--2">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>

    <div class="flower flower--3">
      <div class="flower__leafs flower__leafs--3">
        <div class="flower__leaf flower__leaf--1"></div>
        <div class="flower__leaf flower__leaf--2"></div>
        <div class="flower__leaf flower__leaf--3"></div>
        <div class="flower__leaf flower__leaf--4"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>

    <!-- rumput & efek tetap -->
    <div class="growing-grass"></div>
    <div class="grow-ans"></div>
    <div class="long-g"></div>

  </div>

  <!-- 📹 Video Box -->
  <div class="video-container">
    <video id="myVideo" autoplay muted loop playsinline controls>
      <source src="videoplayback.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <script src="main.js"></script>

  <!-- 🛠️ SCRIPT KHUSUS UNTUK MEMAKSA VIDEO BERPUTAR -->
  <script>
    const video = document.getElementById('myVideo');

    // Coba putar otomatis saat load
    window.addEventListener('load', () => {
      video.play().catch(error => {
        console.log("Autoplay diblokir oleh browser, menunggu interaksi user...", error);
      });
    });

    // Paksa putar begitu user menyentuh atau mengeklik area mana saja di layar
    document.addEventListener('click', () => {
      if (video.paused) {
        video.play();
      }
    }, { once: true }); // Hanya berjalan sekali klik awal saja
  </script>
</body>
</html>
